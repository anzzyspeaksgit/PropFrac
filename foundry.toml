[profile.default]
src = "contracts"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
optimizer = true
optimizer_runs = 200

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"
multiline_func_header = "all"
quote_style = "double"
number_underscore = "thousands"

[rpc_endpoints]
local = "http://127.0.0.1:8545"
bnb_testnet = "https://data-seed-prebsc-1-s1.bnbchain.org:8545"
